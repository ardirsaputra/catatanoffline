name: notecustomseasyuse
description: "BerkasKu - Aplikasi Berkas & Kuesioner Profesional"
publish_to: "none"
version: 2.0.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Rich text editor
  flutter_quill: ^9.2.3

  # Signature pad
  signature: ^5.4.0

  # Image picker
  image_picker: ^1.1.2

  # File sharing
  share_plus: ^9.0.0

  # File path utilities
  path_provider: ^2.1.3
  path: ^1.9.0

  # Color picker
  flex_color_picker: ^3.4.1

  # Fonts
  google_fonts: ^6.2.1

  # UUID generation
  uuid: ^4.4.2

  # Date formatting
  intl: ^0.20.0

  # Archive/ZIP for DOCX export
  archive: ^3.6.1

  # XML building for DOCX
  xml: ^6.5.0

  # File picker
  file_picker: ^8.0.0

  # Receive shared / opened files (docx from file manager or share sheet)
  receive_sharing_intent: ^1.8.1

  # Biometric authentication
  local_auth: ^2.3.0

  # Home screen widget
  home_widget: ^0.6.0

  # PIN hashing
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 26
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
  linux:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icon/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
